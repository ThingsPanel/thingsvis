openapi: 3.0.3
info:
  title: ThingsVis Projects API
  version: 1.0.0
  description: CRUD API for managing projects (dashboard containers)

servers:
  - url: /api/v1
    description: API v1

paths:
  /projects:
    get:
      summary: List projects
      description: Returns paginated list of projects for the authenticated user's tenant
      operationId: listProjects
      tags: [Projects]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number (1-indexed)
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Items per page
      responses:
        '200':
          description: Paginated project list
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProjectListItem'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    post:
      summary: Create project
      description: Creates a new project in the authenticated user's tenant
      operationId: createProject
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectInput'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /projects/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Project ID
    
    get:
      summary: Get project details
      description: Returns a single project with its dashboards
      operationId: getProject
      tags: [Projects]
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    
    put:
      summary: Update project
      description: Updates project name and/or description
      operationId: updateProject
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectInput'
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    
    delete:
      summary: Delete project
      description: Deletes project and all associated dashboards
      operationId: deleteProject
      tags: [Projects]
      responses:
        '200':
          description: Project deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  schemas:
    Project:
      type: object
      required: [id, name, tenantId, createdById, createdAt, updatedAt]
      properties:
        id:
          type: string
          example: clx1234567890
        name:
          type: string
          maxLength: 255
          example: My Dashboard Project
        description:
          type: string
          maxLength: 2000
          nullable: true
        thumbnail:
          type: string
          nullable: true
        tenantId:
          type: string
        createdById:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProjectListItem:
      allOf:
        - $ref: '#/components/schemas/Project'
        - type: object
          properties:
            createdBy:
              $ref: '#/components/schemas/UserSummary'
            _count:
              type: object
              properties:
                dashboards:
                  type: integer
                  example: 5

    ProjectDetail:
      allOf:
        - $ref: '#/components/schemas/Project'
        - type: object
          properties:
            createdBy:
              $ref: '#/components/schemas/UserSummary'
            dashboards:
              type: array
              items:
                $ref: '#/components/schemas/DashboardSummary'

    UserSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          nullable: true
        email:
          type: string

    DashboardSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        isPublished:
          type: boolean

    CreateProjectInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: New Project
        description:
          type: string
          maxLength: 2000
          example: Project description

    UpdateProjectInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 2000

    PaginationMeta:
      type: object
      required: [page, limit, total, totalPages]
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 42
        totalPages:
          type: integer
          example: 3

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string
        details:
          type: object

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Unauthorized
    
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Project not found
    
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Validation failed
            details:
              fieldErrors:
                name: ["Required"]

  securitySchemes:
    session:
      type: apiKey
      in: cookie
      name: next-auth.session-token

security:
  - session: []

tags:
  - name: Projects
    description: Project management endpoints
