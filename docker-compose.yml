# ThingsVis Docker Compose
# 用法: docker-compose up -d
#
# 需要先复制环境变量文件:
#   cp apps/server/.env.example .env
# 并编辑 .env 填写 AUTH_SECRET 等必要配置

services:
  # ─── API Server (Next.js) ─────────────────────────
  server:
    image: ghcr.io/thingspanel/thingsvis-server:latest
    container_name: thingsvis-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - AUTH_TRUST_HOST=true
    volumes:
      # 持久化数据库（PostgreSQL 外置时可移除此 volume）
      - thingsvis-db:/app/apps/server/prisma
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/api/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── Studio (编辑器 SPA + Nginx) ───────────────────
  studio:
    image: ghcr.io/thingspanel/thingsvis-studio:latest
    container_name: thingsvis-studio
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_healthy

volumes:
  thingsvis-db:
    driver: local

# ─── 访问地址 ─────────────────────────────────────────
# Studio  (编辑器): http://localhost:3000
# Server  (API):    http://localhost:8000
