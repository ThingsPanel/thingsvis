# ThingsVis Docker Compose
# 用法: docker-compose up -d
#
# 需要先复制环境变量文件:
#   cp apps/server/.env.example .env
# 并编辑 .env 填写 AUTH_SECRET 等必要配置

services:
  # ─── API Server (Next.js) ─────────────────────────
  server:
    image: ghcr.io/thingspanel/thingsvis-server:latest
    container_name: thingsvis-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - AUTH_TRUST_HOST=true
    volumes:
      # 持久化 SQLite 数据库（生产环境建议改用 PostgreSQL）
      - thingsvis-db:/app/apps/server/prisma
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── Studio (编辑器 SPA + Nginx) ───────────────────
  studio:
    image: ghcr.io/thingspanel/thingsvis-studio:latest
    container_name: thingsvis-studio
    restart: unless-stopped
    ports:
      - "7050:80"
    depends_on:
      server:
        condition: service_healthy

  # ─── Preview (预览 SPA + Nginx) ────────────────────
  preview:
    image: ghcr.io/thingspanel/thingsvis-preview:latest
    container_name: thingsvis-preview
    restart: unless-stopped
    ports:
      - "7051:80"

volumes:
  thingsvis-db:
    driver: local

# ─── 访问地址 ─────────────────────────────────────────
# Studio  (编辑器): http://localhost:7050
# Preview (预览):   http://localhost:7051
# Server  (API):    http://localhost:3001
