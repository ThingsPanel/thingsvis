# ThingsVis Nginx Configuration
# Best-practice template for user deployments
#
# Quick start:
#   1. Replace YOUR_DOMAIN with your domain (or use _ for IP-only)
#   2. For HTTPS: uncomment SSL section and run certbot
#   3. Copy to /etc/nginx/conf.d/thingsvis.conf
#   4. nginx -t && systemctl reload nginx

# ─── HTTP → HTTPS redirect (enable after SSL is configured) ──────────────────
# server {
#     listen 80;
#     server_name YOUR_DOMAIN;
#     return 301 https://$host$request_uri;
# }

# ─── Main server block ────────────────────────────────────────────────────────
server {
    listen 80;
    # listen 443 ssl http2;          # uncomment for HTTPS
    server_name YOUR_DOMAIN;         # e.g. thingsvis.example.com  or  _

    # ── SSL (uncomment after: certbot --nginx -d YOUR_DOMAIN) ──────────────
    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    # ssl_prefer_server_ciphers off;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 1d;

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    # add_header Strict-Transport-Security "max-age=63072000" always; # enable with HTTPS

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 4;
    gzip_types text/plain application/javascript application/x-javascript text/css application/json image/svg+xml;
    gzip_vary on;

    root /var/www/thingsvis-studio;
    index main.html index.html;

    # ── Studio SPA ────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /main.html;
    }

    # ── Preview SPA ───────────────────────────────────────────────────────
    location /preview/ {
        alias /var/www/thingsvis-preview/;
        index index.html;
        try_files $uri $uri/ /preview/index.html;
    }

    # ── Plugins (static assets) ───────────────────────────────────────────
    location ^~ /plugins/ {
        alias /var/www/thingsvis-plugins/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
    }

    # ── User uploads ──────────────────────────────────────────────────────
    location ^~ /uploads/ {
        alias /opt/thingsvis/server/apps/server/public/uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Static asset cache ────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?|ttf|eot|ico|webp)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── API proxy → ThingsVis Server (Next.js) ────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:7051;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
    }
}
