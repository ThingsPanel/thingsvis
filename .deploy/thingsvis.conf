# ThingsVis Studio (port 3000)
server {
    listen 3000;
    server_name _;

    root /var/www/thingsvis-studio;
    index main.html index.html;

    # SPA routing
    location / {
        try_files $uri $uri/ /main.html;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, OPTIONS';
        add_header Access-Control-Allow-Headers 'Content-Type, Authorization';
    }

    # Static assets cache
    location ~* \.(js|css|png|jpg|svg|woff2?|ttf|eot|ico)$ {
        expires 7d;
        add_header Cache-Control 'public';
        add_header Access-Control-Allow-Origin *;
    }

    # Plugins
    location /plugins/ {
        alias /var/www/thingsvis-plugins/;
        add_header Access-Control-Allow-Origin *;
    }

    # Proxy API to ThingsVis Server
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
