name: Release

# 触发条件: 推送符合 v* 格式的 tag（如 v0.1.0、v1.2.3）
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/thingsvis
  # 阿里云镜像仓库
  ALIYUN_REGISTRY: registry.cn-hangzhou.aliyuncs.com
  ALIYUN_IMAGE_PREFIX: registry.cn-hangzhou.aliyuncs.com/${{ github.repository_owner }}/thingsvis

jobs:
  # ============================================================
  # Job 1: Build application artifacts (tar.gz)
  # ============================================================
  build-artifacts:
    name: Build & Package
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      version: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Version: ${TAG}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Build ──────────────────────────────────────────────
      - name: Generate Prisma Client
        working-directory: apps/server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'file:./prisma/dev.db' }}
        run: npx prisma generate

      - name: Build Server + Studio
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'file:./prisma/dev.db' }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
        run: pnpm turbo run build --filter=@thingsvis/server --filter=studio

      - name: Build Widgets
        run: pnpm run build:widgets

      # ── Package tar.gz ─────────────────────────────────────
      - name: Package release archive
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          mkdir -p release/server release/studio release/widgets

          # Server (Next.js standalone)
          cp -r apps/server/.next/standalone/. release/server/
          mkdir -p release/server/apps/server/.next/static
          cp -r apps/server/.next/static/. release/server/apps/server/.next/static/
          [ -d apps/server/public ] && cp -r apps/server/public release/server/apps/server/public
          
          # Copy entrypoint script
          cp apps/server/docker-entrypoint.sh release/server/
          
          # Copy prisma schema for db init
          cp -r apps/server/prisma release/server/apps/server/prisma

          # Copy seed script
          [ -d apps/server/scripts ] && cp -r apps/server/scripts release/server/apps/server/scripts

          # Studio (static SPA)
          [ -d apps/studio/dist ] && cp -r apps/studio/dist/. release/studio/ && echo "✅ Studio packaged"

          # Widgets
          for dir in widgets/*/*/; do
            if [ -d "${dir}dist" ]; then
              rel_path="${dir#widgets/}"
              rel_path="${rel_path%/}"
              mkdir -p "release/widgets/${rel_path}"
              cp -r "${dir}dist" "release/widgets/${rel_path}/"
            fi
          done
          echo "✅ Widgets packaged"

          # Nginx config + docker-compose
          cp .deploy/thingsvis.conf release/thingsvis.conf 2>/dev/null || echo "⚠️  No nginx config found"
          cp docker-compose.yml release/docker-compose.yml
          cp apps/server/.env.example release/.env.example

          # Create tarball
          cd release && tar -czf ../thingsvis-${VERSION}.tar.gz .
          echo "📦 Archive size: $(du -h ../thingsvis-${VERSION}.tar.gz | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: thingsvis-release
          path: thingsvis-${{ steps.version.outputs.tag }}.tar.gz
          retention-days: 1

  # ============================================================
  # Job 2: Build & Push Docker images
  # ============================================================
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-artifacts
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_IMAGE_USER }}
          password: ${{ secrets.ALIYUN_IMAGE_PASS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push Server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-server:${{ needs.build-artifacts.outputs.version }}
            ${{ env.IMAGE_PREFIX }}-server:latest
            ${{ env.ALIYUN_IMAGE_PREFIX }}-server:${{ needs.build-artifacts.outputs.version }}
            ${{ env.ALIYUN_IMAGE_PREFIX }}-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DATABASE_URL=file:./prisma/dev.db
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}

      # Studio image (nginx + static files + plugins)
      - name: Build & push Studio image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/studio/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-studio:${{ needs.build-artifacts.outputs.version }}
            ${{ env.IMAGE_PREFIX }}-studio:latest
            ${{ env.ALIYUN_IMAGE_PREFIX }}-studio:${{ needs.build-artifacts.outputs.version }}
            ${{ env.ALIYUN_IMAGE_PREFIX }}-studio:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Job 3: Create GitHub Release
  # ============================================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-artifacts, build-docker]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: thingsvis-release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-artifacts.outputs.version }}
          name: "ThingsVis ${{ needs.build-artifacts.outputs.version }}"
          draft: false
          prerelease: ${{ contains(needs.build-artifacts.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            thingsvis-${{ needs.build-artifacts.outputs.version }}.tar.gz
          body: |
            ## 🚀 ThingsVis ${{ needs.build-artifacts.outputs.version }}

            ### 安装方式

            **方式一：Docker Compose（推荐）**
            ```bash
            # 下载压缩包并解压
            tar -xzf thingsvis-${{ needs.build-artifacts.outputs.version }}.tar.gz

            # 复制并编辑环境变量
            cp .env.example .env
            # 编辑 .env，填写 AUTH_SECRET 等配置

            # 启动所有服务
            docker-compose up -d
            ```

            **方式二：手动部署**
            ```bash
            tar -xzf thingsvis-${{ needs.build-artifacts.outputs.version }}.tar.gz

            # 启动 API Server
            node server/apps/server/server.js

            # 用 Nginx 托管静态文件（参考 thingsvis.conf）
            ```

            ### Docker 镜像

            | 服务 | GitHub镜像 | 阿里云镜像 |
            |------|-----------|-----------|
            | Server (API) | `ghcr.io/${{ github.repository_owner }}/thingsvis-server:${{ needs.build-artifacts.outputs.version }}` | `registry.cn-hangzhou.aliyuncs.com/${{ github.repository_owner }}/thingsvis-server:${{ needs.build-artifacts.outputs.version }}` |
            | Studio (编辑器) | `ghcr.io/${{ github.repository_owner }}/thingsvis-studio:${{ needs.build-artifacts.outputs.version }}` | `registry.cn-hangzhou.aliyuncs.com/${{ github.repository_owner }}/thingsvis-studio:${{ needs.build-artifacts.outputs.version }}` |

            ### 访问地址
            - Studio（编辑器）: `http://your-host:3000`
            - Server（API）: `http://your-host:8000`

            ### 默认账号
            - Email: `admin@thingsvis.io`
            - Password: `admin123`
            - ⚠️ 请登录后立即修改密码！
