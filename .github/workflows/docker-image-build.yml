name: Docker Image Build

# 触发条件: 推送符合 v* 格式的 tag（如 v0.1.0、v3）或手动触发
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/thingsvis
  # 阿里云镜像仓库
  ALIYUN_REGISTRY: registry.cn-hangzhou.aliyuncs.com
  ALIYUN_IMAGE_PREFIX: registry.cn-hangzhou.aliyuncs.com/${{ github.repository_owner }}/thingsvis

jobs:
  # ============================================================
  # Build & Push Docker images
  # ============================================================
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      version: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Version: ${TAG}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ secrets.IMAGE_USER }}
          password: ${{ secrets.IMAGE_PASS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push Server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-server:${{ steps.version.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-server:latest
            ${{ env.ALIYUN_IMAGE_PREFIX }}-server:${{ steps.version.outputs.tag }}
            ${{ env.ALIYUN_IMAGE_PREFIX }}-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DATABASE_URL=file:./prisma/dev.db
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}

      # Studio image (nginx + static files + plugins)
      - name: Build & push Studio image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/studio/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-studio:${{ steps.version.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-studio:latest
            ${{ env.ALIYUN_IMAGE_PREFIX }}-studio:${{ steps.version.outputs.tag }}
            ${{ env.ALIYUN_IMAGE_PREFIX }}-studio:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
