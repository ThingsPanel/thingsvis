name: Docker Image Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

env:
  ALIYUN_REGISTRY: registry.cn-hangzhou.aliyuncs.com

jobs:
  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      owner_lower: ${{ steps.version.outputs.owner_lower }}
    steps:
      - name: Resolve version tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          OWNER_LOWER="${{ github.repository_owner }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "owner_lower=${OWNER_LOWER,,}" >> "$GITHUB_OUTPUT"
          echo "Version: ${TAG}, Owner: ${OWNER_LOWER,,}"

  build-docker:
    name: Build ${{ matrix.image_name }} (${{ matrix.arch }})
    needs: resolve-version
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: thingsvis-server
            dockerfile: apps/server/Dockerfile
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
            build_args: |
              DATABASE_URL=file:./prisma/dev.db
          - image_name: thingsvis-server
            dockerfile: apps/server/Dockerfile
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            build_args: |
              DATABASE_URL=file:./prisma/dev.db
          - image_name: thingsvis-studio
            dockerfile: apps/studio/Dockerfile
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
            build_args: ""
          - image_name: thingsvis-studio
            dockerfile: apps/studio/Dockerfile
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            build_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ secrets.IMAGE_USER }}
          password: ${{ secrets.IMAGE_PASS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push architecture image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ needs.resolve-version.outputs.owner_lower }}/${{ matrix.image_name }}:${{ needs.resolve-version.outputs.tag }}-${{ matrix.arch }}
            registry.cn-hangzhou.aliyuncs.com/${{ needs.resolve-version.outputs.owner_lower }}/${{ matrix.image_name }}:${{ needs.resolve-version.outputs.tag }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.image_name }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}-${{ matrix.arch }}
          build-args: ${{ matrix.build_args }}

  publish-manifest:
    name: Publish ${{ matrix.image_name }} manifest
    needs:
      - resolve-version
      - build-docker
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image_name:
          - thingsvis-server
          - thingsvis-studio
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ secrets.IMAGE_USER }}
          password: ${{ secrets.IMAGE_PASS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Publish multi-arch manifests
        run: |
          TAG="${{ needs.resolve-version.outputs.tag }}"
          OWNER="${{ needs.resolve-version.outputs.owner_lower }}"
          IMAGE="${{ matrix.image_name }}"

          docker buildx imagetools create \
            -t "ghcr.io/${OWNER}/${IMAGE}:${TAG}" \
            -t "ghcr.io/${OWNER}/${IMAGE}:latest" \
            "ghcr.io/${OWNER}/${IMAGE}:${TAG}-amd64" \
            "ghcr.io/${OWNER}/${IMAGE}:${TAG}-arm64"

          docker buildx imagetools create \
            -t "${ALIYUN_REGISTRY}/${OWNER}/${IMAGE}:${TAG}" \
            -t "${ALIYUN_REGISTRY}/${OWNER}/${IMAGE}:latest" \
            "${ALIYUN_REGISTRY}/${OWNER}/${IMAGE}:${TAG}-amd64" \
            "${ALIYUN_REGISTRY}/${OWNER}/${IMAGE}:${TAG}-arm64"
